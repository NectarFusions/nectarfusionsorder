[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# The SPA fallback also lives in public/_redirects. Both are fine;
# this one is here so the config is readable in one place.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
